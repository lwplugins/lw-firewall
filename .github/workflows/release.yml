name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'lw-firewall.php'
      - 'worker/lw-firewall-worker.php'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from plugin file
        id: get_version
        run: |
          VERSION=$(grep -m1 "Version:" lw-firewall.php | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Verify worker version matches plugin version
        env:
          PLUGIN_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          WORKER_FILE="worker/lw-firewall-worker.php"
          if [ ! -f "$WORKER_FILE" ]; then
            echo "::error file=$WORKER_FILE::Worker file is missing"
            exit 1
          fi

          WORKER_HEADER=$(grep -m1 "@version" "$WORKER_FILE" | sed 's/.*@version[[:space:]]*//' | tr -d '[:space:]')
          WORKER_CONST=$(grep -m1 "LW_FIREWALL_WORKER_VERSION" "$WORKER_FILE" \
            | sed -E "s/.*LW_FIREWALL_WORKER_VERSION'[^']*'([^']+)'.*/\1/")

          echo "Plugin Version:  $PLUGIN_VERSION"
          echo "Worker @version: $WORKER_HEADER"
          echo "Worker constant: $WORKER_CONST"

          FAIL=0
          if [ "$WORKER_HEADER" != "$PLUGIN_VERSION" ]; then
            echo "::error file=$WORKER_FILE::Worker @version ($WORKER_HEADER) does not match plugin Version ($PLUGIN_VERSION). The worker has a runtime version guard that silently disables the firewall on mismatch — bump worker/lw-firewall-worker.php in lockstep."
            FAIL=1
          fi
          if [ "$WORKER_CONST" != "$PLUGIN_VERSION" ]; then
            echo "::error file=$WORKER_FILE::LW_FIREWALL_WORKER_VERSION ($WORKER_CONST) does not match plugin Version ($PLUGIN_VERSION). Bump the constant alongside the @version header."
            FAIL=1
          fi
          exit $FAIL

      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

      - name: Setup PHP
        if: steps.check_tag.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install production dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create release ZIP
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          mkdir -p dist/lw-firewall
          rsync -av --exclude='.git' --exclude='.github' --exclude='dist' \
            --exclude='builds' --exclude='composer.json' --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' --exclude='node_modules' --exclude='.gitignore' \
            --exclude='*.log' . dist/lw-firewall/
          cd dist && zip -r "lw-firewall-${VERSION}.zip" lw-firewall/

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          body: |
            ## LW Firewall v${{ steps.get_version.outputs.version }}

            ### Installation

            **Via Composer:**
            ```bash
            composer require lwplugins/lw-firewall
            ```

            **Manual Installation:**
            1. Download `lw-firewall-${{ steps.get_version.outputs.version }}.zip`
            2. Upload to `/wp-content/plugins/`
            3. Activate in WordPress admin

            ### Changelog

            See [readme.txt](https://github.com/lwplugins/lw-firewall/blob/main/readme.txt) for full changelog.
          files: |
            dist/lw-firewall-${{ steps.get_version.outputs.version }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
